name: CI

on:
  pull_request:
    branches: ['*']

# Drop all permissions by default — each job grants only what it needs
permissions: {}

jobs:
  # ---------------------------------------------------------------------------
  # Windows — MSBuild (Debug + Release matrix)
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read  # Required to checkout the repository
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution (${{ matrix.configuration }})
        run: msbuild rslibs.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x86 /p:PlatformToolset=v143

      - name: Configure tests (CMake)
        run: cmake -S tests -B tests/build -A Win32

      - name: Build tests
        run: cmake --build tests/build --config Release

      - name: Run tests
        run: ctest --test-dir tests/build -C Release --output-on-failure

  # ---------------------------------------------------------------------------
  # Linux — Make + CMake tests
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Required to checkout the repository
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl-dev libglu1-mesa-dev libx11-dev libglx-dev

      - name: Create util symlink
        run: ln -s rsUtility util

      - name: Build all libraries
        run: make -j$(nproc)

      - name: Configure tests (CMake)
        run: cmake -S tests -B tests/build

      - name: Build tests
        run: cmake --build tests/build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir tests/build --output-on-failure
